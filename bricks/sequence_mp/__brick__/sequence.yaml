remote_data_source_contract:
  import: |
    import '../requests/{{feature.snakeCase()}}_{{slice.snakeCase()}}_request.dart';
  code: |
    Future<void> {{method.camelCase()}}({{feature.pascalCase()}}{{slice.pascalCase()}}Request request);

remote_data_source_impl:
  import: |
    import '../requests/{{feature.snakeCase()}}_{{slice.snakeCase()}}_request.dart';
  code: |
    @override
    Future<void> {{method.camelCase()}}({{feature.pascalCase()}}{{slice.pascalCase()}}Request request) async {
      final response = await _apiClient.delete<Map>('/{{#paramCase}}{{feature}}{{/paramCase}}/{{#paramCase}}{{slice}}{{/paramCase}}');
      if (response.statusCode == 200) return;
      throw {{module.pascalCase()}}Exception.fromApiResponse(response);
    }

repository_contract:
  import: |
    import '../params/{{feature.snakeCase()}}_{{slice.snakeCase()}}_param.dart';
  code: |
    AsyncResult<void> {{method.camelCase()}}({{feature.pascalCase()}}{{slice.pascalCase()}}Param param);

repository_impl:
  import: |
    import '../../domain/params/{{feature.snakeCase()}}_{{slice.snakeCase()}}_param.dart';
    import '../requests/{{feature.snakeCase()}}_{{slice.snakeCase()}}_request.dart';
  code: |
    @override
    AsyncResult<void> {{method.camelCase()}}({{feature.pascalCase()}}{{slice.pascalCase()}}Param param) async {
      final request = {{feature.pascalCase()}}{{slice.pascalCase()}}Request.fromParam(param);

      try {
        await _remoteDataSource.{{method.camelCase()}}(request);
        return const Result.success(null);
      } catch (e, st) {
        return handleException('{{method.camelCase()}}', e, st);
      }
    }

export:
  domain: |
    export 'domain/usecases/{{feature.snakeCase()}}_{{slice.snakeCase()}}_use_case.dart';
    export 'domain/params/{{feature.snakeCase()}}_{{slice.snakeCase()}}_param.dart';
  logic: |
    export 'logic/{{slice.snakeCase()}}/{{feature.snakeCase()}}_{{slice.snakeCase()}}_cubit.dart';
    export 'logic/{{slice.snakeCase()}}/{{feature.snakeCase()}}_{{slice.snakeCase()}}_state.dart';

post_hooks:
  - dart run build_runner build --force-jit --delete-conflicting-outputs