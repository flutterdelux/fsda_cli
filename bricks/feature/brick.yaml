name: feature
description: FSDA clean architecture feature blueprint.
version: 1.0.0+1
environment:
  mason: ">=0.1.0-dev.54 <0.1.0"
vars:
  feature:
    type: string
    description: The snake_case name of the feature (e.g. wallet)
    prompt: What is the feature name?
  retrieval_check_point:
    type: string
    description: The retrieval check point for the feature (e.g. // --- Retrieval ---)
    prompt: What is the retrieval check point for the feature?
  mutation_check_point:
    type: string
    description: The mutation check point for the feature (e.g. // --- Mutation ---)
    prompt: What is the mutation check point for the feature?