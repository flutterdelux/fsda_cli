name: app
description: FSDA clean architecture app blueprint.
version: 1.0.0+1
environment:
  mason: ">=0.1.0-dev.54 <0.1.0"
vars:
  app:
    type: string
    description: The snake_case name of the app (e.g. fsda_demo)
    prompt: What is the app name?
  dart_sdk:
    type: string
    description: The Dart SDK constraint for the app (e.g. ">=3.0.0 <4.0.0", ^3.0.0)
    prompt: What is the Dart SDK constraint for the app?