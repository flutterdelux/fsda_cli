flutter_launcher_icons:
  image_path: "assets/images/launcher-icon.png"
  # image_path_android: "assets/images/icon-710x599-android.png"
  # image_path_ios: "assets/images/icon-1024x1024.png"
  android: true # can specify file name here e.g. "ic_launcher"
  ios: true # can specify file name here e.g. "My-Launcher-Icon"
  # adaptive_icon_background: "config/images/logo-foreground.png" # only available for Android 8.0 devices and above
  adaptive_icon_background: "#0E1113" # only available for Android 8.0 devices and above
  adaptive_icon_foreground: "assets/images/launcher-icon-foreground.png" # only available for Android 8.0 devices and above
  # adaptive_icon_foreground_inset: 16 # only available for Android 8.0 devices and above
  min_sdk_android: 23
  remove_alpha_ios: true
  background_color_ios: "#0E1113"
  web:
    generate: true
    image_path: "assets/images/launcher-icon.png"
    background_color: "#0E1113"
    theme_color: "#00B7FF"
  windows:
    generate: true
    image_path: "assets/images/launcher-icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/launcher-icon.png"
