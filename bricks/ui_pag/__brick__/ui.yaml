arb: |
  "{{feature.camelCase()}}ListTitle": "{{feature.titleCase()}} List",
  "{{feature.camelCase()}}ListEmptyTitle": "No {{feature.titleCase()}} Found",
  "{{feature.camelCase()}}ListEmptyMessage": "No {{feature.titleCase().lowerCase()}} found at the moment",
  "{{feature.camelCase()}}ListErrorTitle": "Failed to Load {{feature.titleCase()}} List"

export:
  ui: |
    export 'ui/{{slice.snakeCase()}}/views/{{feature.snakeCase()}}_list_view.dart';
    export 'ui/{{slice.snakeCase()}}/widgets/{{feature.snakeCase()}}_list_content.dart';
    export 'ui/{{slice.snakeCase()}}/widgets/{{feature.snakeCase()}}_list_empty_feedback.dart';
    export 'ui/{{slice.snakeCase()}}/widgets/{{feature.snakeCase()}}_list_error_feedback.dart';
    export 'ui/{{slice.snakeCase()}}/widgets/{{feature.snakeCase()}}_list_skeleton.dart';

post_hooks:
  - flutter gen-l10n